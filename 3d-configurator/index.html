<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kroma | 3D Configurator</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Loading Screen for 3D Assets -->
  <div id="loader" class="loader-bg">
    <div class="loader-content">
      <h2 class="loader-brand">KROMA</h2>
      <div class="progress-bar-wrap">
        <div id="loading-bar" class="progress-bar"></div>
      </div>
      <p id="loading-text">Loading 3D Engine...</p>
    </div>
  </div>

  <nav class="top-nav">
    <div class="brand">KROMA.</div>
    <div class="nav-links">
      <a href="#">Gallery</a>
      <a href="#" class="active">Configurator</a>
      <a href="#">Support</a>
    </div>
    <div class="cart-btn"><i class="fa-solid fa-cart-shopping"></i></div>
  </nav>

  <!-- 3D Canvas Container -->
  <div id="canvas-container"></div>

  <!-- UI Overlay -->
  <div class="ui-panel">
    
    <div class="product-info">
      <h1>Aura Series X</h1>
      <p class="price" id="priceDisplay">$4,500</p>
      <p class="description">
        Drag to rotate. Scroll to zoom.<br>
        Customize the primary shell finish below.
      </p>
    </div>

    <div class="color-options" id="colorOptions">
      <h3>Select Finish</h3>
      <div class="swatches">
        <button class="swatch active" data-color="#111111" data-roughness="0.2" data-metalness="0.8" style="background: #111;" aria-label="Obsidian Black"></button>
        <button class="swatch" data-color="#E8E8E8" data-roughness="0.4" data-metalness="0.6" style="background: #E8E8E8;" aria-label="Frost White"></button>
        <button class="swatch" data-color="#D4AF37" data-roughness="0.1" data-metalness="1.0" style="background: linear-gradient(135deg, #FFDF73, #D4AF37);" aria-label="Solid Gold"></button>
        <button class="swatch" data-color="#FF5722" data-roughness="0.5" data-metalness="0.1" style="background: #FF5722;" aria-label="Matte Orange"></button>
        <button class="swatch" data-color="#3F51B5" data-roughness="0.2" data-metalness="0.9" style="background: linear-gradient(135deg, #7986CB, #3F51B5);" aria-label="Metallic Blue"></button>
      </div>
    </div>

    <!-- Additional Options -->
    <div class="texture-options">
      <h3>Accents</h3>
      <div class="button-group">
        <button class="outline-btn active" id="btn-silver">Silver</button>
        <button class="outline-btn" id="btn-carbon">Carbon</button>
      </div>
    </div>

    <!-- Action -->
    <button class="checkout-btn">Add to Cart - $4,500 <i class="fa-solid fa-arrow-right"></i></button>

  </div>

  <div class="hint">
    <i class="fa-solid fa-hand-pointer"></i> Interact with the model
  </div>

  <!-- Three.js Library & OrbitControls via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="script.js"></script>
  <script src="../global-features.js"></script>
</body>
</html>

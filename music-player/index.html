<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sonorus Web Player</title>
  <link rel="stylesheet" href="style.css">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Ambient Background acting as visualizer -->
  <div class="ambient-bg" id="ambientBg"></div>

  <div class="player-container glass">
    
    <!-- Top Bar -->
    <div class="top-bar">
      <i class="fa-solid fa-chevron-down"></i>
      <span>Now Playing</span>
      <i class="fa-solid fa-ellipsis-vertical"></i>
    </div>

    <!-- Album Art / Vinyl -->
    <div class="album-container">
      <div class="vinyl-record" id="vinyl">
        <div class="vinyl-grooves"></div>
        <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=2000&auto=format&fit=crop" alt="Album Art" class="album-art">
        <div class="vinyl-center"></div>
      </div>
    </div>

    <!-- Track Info -->
    <div class="track-info">
      <h2 class="track-title">Midnight Synthesia</h2>
      <p class="track-artist">The Midnight</p>
    </div>

    <!-- Progress Bar -->
    <div class="progress-container">
      <div class="time-current">0:00</div>
      <div class="progress-bar-wrap" id="progressWrap">
        <div class="progress-bar" id="progressBar"></div>
        <div class="progress-handle"></div>
      </div>
      <div class="time-total">3:42</div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="ctrl-btn secondary"><i class="fa-solid fa-shuffle"></i></button>
      <button class="ctrl-btn primary"><i class="fa-solid fa-backward-step"></i></button>
      
      <button class="ctrl-btn play-btn" id="playPauseBtn">
        <div class="play-icon glass"><i class="fa-solid fa-play"></i></div>
      </button>
      
      <button class="ctrl-btn primary"><i class="fa-solid fa-forward-step"></i></button>
      <button class="ctrl-btn secondary"><i class="fa-solid fa-repeat"></i></button>
    </div>

    <!-- Volume -->
    <div class="volume-container">
      <i class="fa-solid fa-volume-low"></i>
      <div class="volume-bar-wrap">
        <div class="volume-bar"></div>
      </div>
      <i class="fa-solid fa-volume-high"></i>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artisan Sleep & Decor | Luxury Collection</title>
    
    <meta name="description" content="Discover artisan mattresses and luxury sofas. Handcrafted comfort with our orthopedic hybrid collection.">
    <meta name="keywords" content="Luxury Mattress, Custom Sofa, Premium Furniture, Orthopedic Bed">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

    <style>
        /* --- 1. LUXURY THEME VARIABLES --- */
        :root {
            --off-white: #FAFAFA;
            --charcoal: #2C2C2C;
            --gold: #D4AF37;
            --champagne: #F7E7CE;
            --card-bg: #FFFFFF;
        }

        [data-theme="dark"] {
            --off-white: #121212;
            --charcoal: #E0E0E0;
            --card-bg: #1E1E1E;
        }

        /* --- 2. BASE STYLES --- */
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--off-white); 
            color: var(--charcoal); 
            margin: 0; 
            transition: background 0.5s ease, color 0.5s ease;
            overflow-x: hidden;
        }

        h1, h2, h3 { font-family: 'Playfair Display', serif; letter-spacing: 1px; }

        /* --- 3. PRE-LOADER --- */
        #preloader {
            position: fixed; inset: 0; background: #222; display: flex; 
            justify-content: center; align-items: center; z-index: 9999;
        }
        .loader-content { text-align: center; color: var(--champagne); }
        .logo-text { font-size: 24px; letter-spacing: 5px; text-transform: uppercase; animation: pulse 2s infinite; }
        .loader-bar { width: 0; height: 1px; background: var(--gold); margin: 10px auto; animation: load 2s forwards; }
        .hide-preloader { opacity: 0; visibility: hidden; transition: 1s; }

        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        @keyframes load { 0% { width: 0; } 100% { width: 150px; } }

        /* --- 4. THEME SWITCHER --- */
        .theme-switch-wrapper {
            position: absolute; top: 20px; right: 20px; z-index: 1001;
            display: flex; align-items: center; gap: 10px; color: var(--gold);
        }
        .theme-switch { position: relative; width: 40px; height: 20px; }
        .theme-switch input { display: none; }
        .slider { background-color: #ccc; cursor: pointer; position: absolute; inset: 0; transition: .4s; border-radius: 20px; }
        .slider:before { content: ""; position: absolute; height: 14px; width: 14px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--gold); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* --- 5. HERO & SECTIONS --- */
        .hero { 
            height: 70vh; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
            url('https://images.unsplash.com/photo-1540518614846-7eded433c457?auto=format&fit=crop&q=80&w=1600') center/cover;
            display: flex; align-items: center; justify-content: center; text-align: center; color: white;
        }
        .container { max-width: 1100px; margin: auto; padding: 60px 20px; }
        .reveal-on-scroll { opacity: 0; transform: translateY(40px); transition: 1s ease-out; }
        .reveal-visible { opacity: 1; transform: translateY(0); }

        /* --- 6. CINEMATIC GALLERY --- */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .gallery-item { position: relative; overflow: hidden; height: 400px; cursor: pointer; border-radius: 2px; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s; filter: grayscale(100%); }
        .gallery-item:hover img { transform: scale(1.1); filter: grayscale(0%); }
        .overlay { 
            position: absolute; bottom: 0; background: rgba(0, 0, 0, 0.8); color: white; 
            width: 100%; padding: 20px; transform: translateY(100%); transition: 0.4s; 
        }
        .gallery-item:hover .overlay { transform: translateY(0); }

        /* --- 7. CONFIGURATOR CARD --- */
        .product-card { background: var(--card-bg); padding: 40px; border-radius: 4px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); max-width: 400px; margin: auto; text-align: center; }
        .price-text { color: #27ae60; font-size: 2.5rem; margin: 20px 0; }
        select { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 4px; background: transparent; color: inherit; }
        .btn-submit { background: var(--gold); color: white; border: none; padding: 15px 30px; width: 100%; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }

        /* --- 8. MODAL --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 10000; }
        .modal-content { background: var(--card-bg); margin: 10% auto; padding: 50px; width: 350px; border-radius: 2px; text-align: center; position: relative; }
        .close { position: absolute; top: 20px; right: 25px; font-size: 30px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="loader-content">
            <h1 class="logo-text">Artisan</h1>
            <div class="loader-bar"></div>
        </div>
    </div>

    <div class="theme-switch-wrapper">
        <label class="theme-switch" for="checkbox">
            <input type="checkbox" id="checkbox" />
            <div class="slider round"></div>
        </label>
        <span>Night Mode</span>
    </div>

    <section class="hero">
        <div class="hero-content">
            <h1 style="font-size: 3.5rem;">The Art of Rest</h1>
            <p style="font-size: 1.2rem; margin-bottom: 30px;">Experience handcrafted comfort for the modern home.</p>
            <button class="btn-submit" style="width: auto; background: transparent; border: 1px solid white;" onclick="openModal()">Book a Consultation</button>
        </div>
    </section>

    <section class="container reveal-on-scroll">
        <h2 style="text-align: center; font-size: 2.5rem;">The Living Collection</h2>
        <div class="gallery-grid">
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1555041469-a586c61ea9bc?auto=format&fit=crop&q=80&w=800" alt="Velvet Lounge Sofa">
                <div class="overlay">The Midnight Lounge</div>
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1493663284031-b7e3aefcae8e?auto=format&fit=crop&q=80&w=800" alt="Modern Leather Sofa">
                <div class="overlay">The Executive Suite</div>
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1586023492125-27b2c045efd7?auto=format&fit=crop&q=80&w=800" alt="Designer Armchair">
                <div class="overlay">The Cloud Recliner</div>
            </div>
        </div>
    </section>

    <section class="container reveal-on-scroll">
        <div class="product-card">
            <h2>Royal Ortho-Hybrid</h2>
            <p>Select your size for instant pricing.</p>
            <select id="sizeSelector" onchange="updatePrice()">
                <option value="15000">Single Size</option>
                <option value="22000">Queen Size</option>
                <option value="28000">King Size</option>
            </select>
            <h2 class="price-text">₹<span id="priceDisplay">15000</span></h2>
            <button class="btn-submit" onclick="openModal()">Request Invitation</button>
        </div>
    </section>

    <div id="consultationModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>Private Invitation</h2>
            <p>Speak with a sleep expert.</p>
            <input type="text" placeholder="Full Name" style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd;">
            <button class="btn-submit" onclick="submitInquiry()">Request Viewing</button>
        </div>
    </div>

    <script>
        // Pre-loader
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('preloader').classList.add('hide-preloader');
            }, 1000);
        });

        // Theme Switcher
        const toggleSwitch = document.querySelector('.theme-switch input[type="checkbox"]');
        function switchTheme(e) {
            if (e.target.checked) {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
            }    
        }
        toggleSwitch.addEventListener('change', switchTheme);
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            toggleSwitch.checked = true;
        }

        // Scroll Reveal
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('reveal-visible');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal-on-scroll').forEach(el => observer.observe(el));

        // Price Update
        function updatePrice() {
            document.getElementById('priceDisplay').innerText = document.getElementById('sizeSelector').value;
        }

        // Modal Controls
        function openModal() { document.getElementById('consultationModal').style.display = "block"; }
        function closeModal() { document.getElementById('consultationModal').style.display = "none"; }
        function submitInquiry() { alert("Your request has been sent!"); closeModal(); }
    </script>
</body>
</html>
